<h2>Student Enrollment (ERP Admin)</h2>

<form id="enrollment_form">

    <div style="
        display:flex;
        gap:10px;
        margin-bottom:25px;
    ">

        <!-- STUDENT IDS -->
        <input
            type="text"
            id="student_ids"
            placeholder="Student IDs : 1,2,3"
            style="
                flex:2;
                padding:12px;
            "
            required
        >

        <!-- COURSE SESSION ID -->
        <input
            type="number"
            id="session_id"
            placeholder="Course Session ID"
            style="
                flex:1;
                padding:12px;
            "
            required
        >

        <!-- BUTTON -->
        <button
            type="submit"
            id="enroll_btn"
            style="
                padding:12px 20px;
                cursor:pointer;
            "
        >
            Enroll
        </button>

    </div>

</form>

<div id="result_box"></div>
