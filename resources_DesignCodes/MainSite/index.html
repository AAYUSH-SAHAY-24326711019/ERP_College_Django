<!--  load   -->
<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>College ERP</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
rel="stylesheet">


<style>

/* NAVBAR */

.navbar{
padding:12px 0;
}

.logo{
height:48px;
}

/* CAROUSEL */

.carousel-item img{
height:480px;
object-fit:cover;
}

/* ANNOUNCEMENT SCROLLER */

.notice-bar{
background:#0d6efd;
color:white;
padding:8px 0;
font-size:15px;
}

.notice-bar span{
padding-right:60px;
}

/* MOBILE OPTIMIZATION */

@media(max-width:768px){

.logo{
height:38px;
}

.carousel-item img{
height:240px;
}

.navbar-brand span{
font-size:16px;
}

}

</style>

</head>

<body>


<!-- NAVBAR -->

<nav class="navbar navbar-expand-lg bg-white shadow-sm sticky-top">

<div class="container">

<a class="navbar-brand d-flex align-items-center gap-2" href="#">

<img src="  images/collegelogo.png " class="logo">

<span class="fw-semibold">
ERP Portal
</span>

</a>


<button class="navbar-toggler"
type="button"
data-bs-toggle="collapse"
data-bs-target="#menu">

<span class="navbar-toggler-icon"></span>

</button>


<div class="collapse navbar-collapse" id="menu">

<ul class="navbar-nav ms-auto">

<li class="nav-item">
<a class="nav-link active">Home</a>
</li>

<li class="nav-item">
<a class="nav-link" href="/logstudent">
Student Login
</a>
</li>

<li class="nav-item">
<a class="nav-link" href="/logfaculty">
Faculty Login
</a>
</li>

<li class="nav-item">
<a class="nav-link" href="/loghod">
HOD Login
</a>
</li>

</ul>

</div>

</div>

</nav>



<!-- NOTICE SCROLLER (COLLEGE STYLE) -->

<div class="notice-bar">

<div class="container">

<marquee scrollamount="6">

<span>Admissions Open 2026</span>

<span>Semester Exam Schedule Released</span>

<span>Internal Marks Uploaded</span>

<span>ERP Portal Updated Successfully</span>

</marquee>

</div>

</div>



<!-- CAROUSEL -->

<div id="mainSlider"
class="carousel slide carousel-fade"
data-bs-ride="carousel"
data-bs-interval="3000">


<div class="carousel-indicators">

<button type="button"
data-bs-target="#mainSlider"
data-bs-slide-to="0"
class="active"></button>

<button type="button"
data-bs-target="#mainSlider"
data-bs-slide-to="1"></button>

<button type="button"
data-bs-target="#mainSlider"
data-bs-slide-to="2"></button>

</div>



<div class="carousel-inner">


<div class="carousel-item active">

<img src="  images/forslide1.jpg "
class="d-block w-100">

</div>


<div class="carousel-item">

<img src="  images/forslide2.jpg "
class="d-block w-100">

</div>


<div class="carousel-item">

<img src="  images/forslide3.jpg "
class="d-block w-100">

</div>


</div>



<button class="carousel-control-prev"
type="button"
data-bs-target="#mainSlider"
data-bs-slide="prev">

<span class="carousel-control-prev-icon"></span>

</button>


<button class="carousel-control-next"
type="button"
data-bs-target="#mainSlider"
data-bs-slide="next">

<span class="carousel-control-next-icon"></span>

</button>


</div>



<!-- QUICK ACCESS BUTTON ROW (LIKE REAL ERP SITES) -->

<div class="container my-4">

<div class="row text-center g-3">


<div class="col-6 col-md-3">

<a href="/logstudent"
class="btn btn-outline-primary w-100">

Student Login

</a>

</div>


<div class="col-6 col-md-3">

<a href="/logfaculty"
class="btn btn-outline-success w-100">

Faculty Login

</a>

</div>


<div class="col-6 col-md-3">

<a href="/loghod"
class="btn btn-outline-warning w-100">

HOD Login

</a>

</div>


<div class="col-6 col-md-3">

<a href="/admin"
class="btn btn-outline-dark w-100">

Admin Panel

</a>

</div>


</div>

</div>



<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
